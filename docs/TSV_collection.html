    <section class="txt">
        <h1>TSV collection: ADJs in boss fight dialogue</h1>
        <p>This collection, made in Cytoscape, looks at the ADJs used in different bosses dialogue in the fights.</p>
        <div class="flex-container">
            <div id="map">
                <script>
                    var map = L.map('map', {
                        maxZoom: 4,
                        crs: L.CRS.Simple
                    });
                    var CoordsControl = L.Control.extend({
                        onAdd: function (map) {
                            var container = L.DomUtil.create('div', 'leaflet-control-mouseposition');
                            map.on('mousemove', function (e) {
                                container.innerHTML = 'Lat: ' + e.latlng.lat.toFixed(4) + ', Lng: ' + e.latlng.lng.toFixed(4);
                            });
                            return container;
                        },
                        onRemove: function (map) {
                        }
                    });

                    var imageUrl = 'images/boss-fight-data-ADJ.png';
                    var imageBounds = [[0, 0], [500, 800]];
                    L.imageOverlay(imageUrl, imageBounds).addTo(map);
                    map.fitBounds(imageBounds);
                    var IconIcon = L.Icon.extend({
                        options: {
                            iconSize: [50, 50],
                            iconAnchor: [23, 40],
                            popupAnchor: [2, -30]
                        }
                    });
                </script>
            </div>
        </div>
